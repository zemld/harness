version: "2"

run:
  timeout: 3m
  tests: true
  allow-parallel-runners: true
  go: "__GO_VERSION__"

formatters:
  enable:
    - goimports
    - gofmt

linters:
  enable:
    - asciicheck
    - bodyclose
    - cyclop
    - dupl
    - decorder
    - errcheck
    - exhaustive
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - loggercheck
    - mnd
    - musttag
    - nestif
    - perfsprint
    - revive
    - staticcheck
    - testifylint
    - tparallel
    - unparam
    - unused
    - usetesting
    - wrapcheck
    - whitespace
    - wsl_v5

  settings:
    cyclop:
      max-complexity: 10

    funlen:
      lines: 90

    revive:
      rules:
        - name: exported
          disabled: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
